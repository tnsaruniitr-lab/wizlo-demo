kind = "web"
previewPath = "/"
title = "Telehealth Ops Exception Agent"
version = "1.0.0"
id = "artifacts/telehealth-ops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25133

[services.development]
run = "pnpm --filter @workspace/telehealth-ops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telehealth-ops", "run", "build" ]
publicDir = "artifacts/telehealth-ops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25133"
BASE_PATH = "/"
